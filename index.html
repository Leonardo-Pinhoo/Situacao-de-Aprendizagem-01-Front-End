<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
        <form>
            <div class="container">
            <h2>Cadastro de Usuário</h2>
            <div class="container-input">
                <label>Nome:</label>
                <input type="text" id="nome" class="input" placeholder="Digite seu nome" required><br>
                <span id="msgNome"></span>
            </div>
            <div class="container-input">
                <label>Email:</label>
                <input type="email" id="email" class="input" placeholder="email@email.com" required><br>
                <span id="msgEmail"></span>
            </div>
            <div class="container-input">
                <label>Senha:</label>
                <input type="password" id="senha" class="input" placeholder="Digite sua senha" required><br>
                <i class="bi bi-eye-fill icon" id="eye"></i>
                <span id="msgSenha"></span>
            </div>
            <div class="container-input">
                <label>Confirmar senha:</label>
                <input type="password" id="confirmarSenha" class="input" placeholder="Confirme sua senha" required><br>
                <i class="bi bi-eye-fill icon" id="eyeConfirmar"></i>
                <span id="msgConfirmarSenha"></span>
            </div>
            <div class="container-input">
                <label>Endereço</label>
                <input type="text" id="endereco" class="input" placeholder="Digite seu endereço" required><br>
                <span id="msgEndereco"></span>
            </div>
            <div class="container-input">
                <label>Telefone/s:</label>
                <input type="text" id="telefone" class="input" placeholder="Digite seu/s telefone/s" required maxlength="11"><br>
                <i class="bi bi-plus-circle icon" id="plus"></i>
                <span id="msgTelefone"></span>
                <ul id="lista"></ul>
            </div>
            <button type="button" id="cadastrar">Cadastrar</button><br>

            <span id="msgButton"></span>
        </form>


    <script src="script.js"></script>

</body>

</html>
